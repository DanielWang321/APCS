<!-- JAVASCRIPT WRITTEN BY ME WITH THE HELP OF GPT -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate a multiple-choice quiz from your notes.">
  <title>Quiz Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page-shell">
    <section class="builder-card" aria-labelledby="builderTitle">
      <h1 id="builderTitle">Quiz Generator</h1>

      <form id="quizForm">
        <div class="settings-grid">
          <label class="field">
            <span class="field-label">Questions</span>
            <span class="input-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.5 9a3.5 3.5 0 1 1 5.4 2.9c-1.1.7-1.9 1.3-1.9 2.6"></path><path d="M12 18h.01"></path></svg>
              <input type="number" id="numQuestions" name="numQuestions" min="1" max="20" value="5" inputmode="numeric" aria-describedby="questionsHint">
            </span>
            <small id="questionsHint">Choose 1 to 20</small>
          </label>

          <label class="field">
            <span class="field-label">Choices per question</span>
            <span class="input-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6h11"></path><path d="M9 12h11"></path><path d="M9 18h11"></path><path d="M4 6h.01"></path><path d="M4 12h.01"></path><path d="M4 18h.01"></path></svg>
              <input type="number" id="numChoices" name="numChoices" min="2" max="6" value="4" inputmode="numeric" aria-describedby="choicesHint">
            </span>
            <small id="choicesHint">Choose 2 to 6</small>
          </label>
        </div>

        <div class="field notes-field">
          <span class="notes-heading">
            <label class="field-label" for="notes">Your notes</label>
            <button type="button" class="sample-button" onclick="fillExampleNotes()">Use sample notes</button>
          </span>
          <textarea id="notes" name="notes" rows="10" placeholder="Paste your class notes, review sheet, or study guide here..." aria-describedby="notesHint"></textarea>
          <span class="notes-footer">
            <small id="notesHint">More detail creates better questions.</small>
            <small id="characterCount">0 characters</small>
          </span>
          <small class="logging-disclaimer">Note: Submitted notes and generated quiz responses are logged.</small>
        </div>

        <button type="submit" id="generateButton" class="generate-button">
          <span class="button-loader" aria-hidden="true"></span>
          <span id="generateButtonText">Generate my quiz</span>
          <svg class="button-arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>
        </button>
      </form>

      <div id="loadingText" class="status-banner hidden" role="status" aria-live="polite">
        <span class="status-banner-icon" aria-hidden="true"></span>
        <span id="statusMessage">Generating your quiz...</span>
      </div>
    </section>

    <section id="quizShell" class="quiz-shell hidden" aria-labelledby="questionText">
      <div class="quiz-header">
        <div class="score-pill">
          <span>Score</span>
          <strong><span id="scoreText">0</span><small id="scoreTotal">/ 0</small></strong>
        </div>
      </div>

      <div class="progress-group">
        <div class="progress-meta">
          <p id="progressText">Question 1 of 5</p>
          <p id="progressPercent">20% complete</p>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill"></div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-heading">
          <span class="question-mark" aria-hidden="true">?</span>
          <h3 id="questionText"></h3>
        </div>

        <div id="choices" class="choices-grid"></div>

        <p id="feedback" class="feedback" aria-live="polite"></p>

        <div class="quiz-actions">
          <button type="button" id="backButton" class="secondary-button" onclick="goBack()">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5"></path><path d="m11 18-6-6 6-6"></path></svg>
            <span>Back</span>
          </button>

          <button type="button" id="primaryQuizButton" class="primary-button" onclick="handlePrimaryQuizButton()">
            Check answer
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    let currentQuiz = null;
    let currentQuestionIndex = 0;
    let selectedAnswers = [];
    let checkedQuestions = [];
    let score = 0;
    let isGenerating = false;

    document.getElementById("quizForm").addEventListener("submit", function (event) {
      event.preventDefault();
      requestQuiz();
    });

    document.getElementById("notes").addEventListener("input", updateCharacterCount);

    async function requestQuiz() {
      if (isGenerating || !validateQuizRequest()) {
        return;
      }

      setGenerating(true);

      try {
        await send();
        showStatus("success", "Your quiz is ready. Work through each question and check your answer.");
        document.getElementById("quizShell").scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (error) {
        console.error(error);
        showStatus("error", "We could not build that quiz. Check your connection and try again.");
      } finally {
        setGenerating(false);
      }
    }

    async function send() {
      const numQuestions = document.getElementById("numQuestions").value;
      const numChoices = document.getElementById("numChoices").value;
      const notes = document.getElementById("notes").value;

      //chatgpt generated to be able to have github pages send to differentiate github pages vs local
      const API_BASE =
        location.hostname === "localhost" || location.hostname === "127.0.0.1"
          ? ""
          : "https://harvest-oversight-tropics.ngrok-free.dev";

      //inspired by chatgpt - gave me an example
      const response = await fetch(`${API_BASE}/api/message`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          numQuestions: numQuestions,
          numChoices: numChoices,
          notes: notes
        })
      })
      const data = await response.json();

      currentQuiz = JSON.parse(data.reply);
      currentQuiz = normalizeQuiz(currentQuiz);
      currentQuestionIndex = 0;
      selectedAnswers = new Array(currentQuiz.questions.length).fill(null);
      checkedQuestions = new Array(currentQuiz.questions.length).fill(false);
      score = 0;

      document.getElementById("quizShell").classList.remove("hidden");
      document.getElementById("scoreText").textContent = "0";
      document.getElementById("scoreTotal").textContent = "/ " + currentQuiz.questions.length;
      document.getElementById("loadingText").classList.add("hidden");

      showQuestion();
    }

    function normalizeQuiz(quiz) {
      if (!quiz || !Array.isArray(quiz.questions) || quiz.questions.length === 0) {
        throw new Error("The generated quiz did not contain any questions.");
      }

      quiz.questions.forEach(function (question) {
        const answerIndex = Number(question.answerIndex);

        if (
          !question.question ||
          !Array.isArray(question.choices) ||
          question.choices.length < 2 ||
          !Number.isInteger(answerIndex) ||
          answerIndex < 0 ||
          answerIndex >= question.choices.length
        ) {
          throw new Error("The generated quiz contained an invalid question.");
        }

        question.answerIndex = answerIndex;
      });

      return quiz;
    }

    function validateQuizRequest() {
      const numQuestions = Number(document.getElementById("numQuestions").value);
      const numChoices = Number(document.getElementById("numChoices").value);
      const notes = document.getElementById("notes").value.trim();

      if (!Number.isInteger(numQuestions) || numQuestions < 1 || numQuestions > 20) {
        showStatus("error", "Choose between 1 and 20 questions.");
        return false;
      }

      if (!Number.isInteger(numChoices) || numChoices < 2 || numChoices > 6) {
        showStatus("error", "Choose between 2 and 6 answer choices.");
        return false;
      }

      if (notes.length < 20) {
        showStatus("error", "Add a little more detail to your notes before generating a quiz.");
        return false;
      }

      return true;
    }

    function setGenerating(generating) {
      isGenerating = generating;

      const button = document.getElementById("generateButton");
      const buttonText = document.getElementById("generateButtonText");

      button.disabled = generating;
      button.classList.toggle("is-loading", generating);
      button.setAttribute("aria-busy", generating);
      buttonText.textContent = generating ? "Building your quiz..." : "Generate my quiz";

      if (generating) {
        showStatus("loading", "Generating your quiz. This can take a few seconds...");
      }
    }

    function showStatus(type, message) {
      const status = document.getElementById("loadingText");

      status.className = "status-banner status-" + type;
      document.getElementById("statusMessage").textContent = message;
    }

    function fillExampleNotes() {
      document.getElementById("notes").value =
        "Java is an object-oriented programming language. A class defines the attributes and behaviors of objects, while an object is an instance of a class. Constructors initialize new objects and have the same name as the class. Instance variables store an object's state, and methods define its behavior. A for loop is useful when the number of repetitions is known, while a while loop repeats as long as its condition is true. Arrays have a fixed length and use zero-based indexes. ArrayList can grow or shrink and provides methods such as add, get, set, and remove. Inheritance allows a subclass to extend a superclass. Method overriding lets a subclass provide its own version of an inherited method.";
      updateCharacterCount();
      showStatus("info", "Sample AP Computer Science A notes added. You can edit them or generate a quiz.");
    }

    function updateCharacterCount() {
      const length = document.getElementById("notes").value.length;
      document.getElementById("characterCount").textContent =
        length + (length === 1 ? " character" : " characters");
    }

    function showQuestion() {
      const question = currentQuiz.questions[currentQuestionIndex];
      const choicesDiv = document.getElementById("choices");
      const feedback = document.getElementById("feedback");
      const backButton = document.getElementById("backButton");
      const primaryButton = document.getElementById("primaryQuizButton");
      const questionNumber = currentQuestionIndex + 1;
      const progress = Math.round((questionNumber / currentQuiz.questions.length) * 100);

      document.getElementById("progressText").textContent =
        "Question " + questionNumber + " of " + currentQuiz.questions.length;
      document.getElementById("progressPercent").textContent = progress + "% complete";
      document.getElementById("questionText").textContent = question.question;
      document.getElementById("progressFill").style.width = progress + "%";
      document.getElementById("scoreText").textContent = score;

      choicesDiv.innerHTML = "";
      feedback.textContent = "";
      feedback.className = "feedback";

      backButton.disabled = currentQuestionIndex === 0;
      backButton.querySelector("span").textContent = "Back";
      backButton.onclick = goBack;
      primaryButton.onclick = handlePrimaryQuizButton;

      if (checkedQuestions[currentQuestionIndex]) {
        primaryButton.textContent =
          currentQuestionIndex === currentQuiz.questions.length - 1
            ? "Finish quiz"
            : "Next question";
      } else {
        primaryButton.textContent = "Check answer";
      }

      appendArrowIcon(primaryButton);
      primaryButton.disabled =
        !checkedQuestions[currentQuestionIndex] && selectedAnswers[currentQuestionIndex] === null;

      question.choices.forEach(function (choice, index) {
        const button = document.createElement("button");
        const choiceLetter = document.createElement("span");
        const choiceText = document.createElement("span");

        button.type = "button";
        button.className = "answer-button";
        button.setAttribute("aria-pressed", selectedAnswers[currentQuestionIndex] === index);

        choiceLetter.className = "choice-letter";
        choiceLetter.textContent = String.fromCharCode(65 + index);
        choiceText.textContent = choice;

        button.appendChild(choiceLetter);
        button.appendChild(choiceText);

        if (selectedAnswers[currentQuestionIndex] === index) {
          button.classList.add("selected");
        }

        if (checkedQuestions[currentQuestionIndex]) {
          button.disabled = true;
          applyAnswerColor(button, index, question);
        }

        button.onclick = function () {
          chooseAnswer(index);
        };

        choicesDiv.appendChild(button);
      });

      if (checkedQuestions[currentQuestionIndex]) {
        showSavedFeedback();
      }
    }

    function appendArrowIcon(button) {
      button.insertAdjacentHTML(
        "beforeend",
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>'
      );
    }

    function chooseAnswer(index) {
      if (checkedQuestions[currentQuestionIndex]) {
        return;
      }

      selectedAnswers[currentQuestionIndex] = index;

      const buttons = document.querySelectorAll(".answer-button");

      buttons.forEach(function (button) {
        button.classList.remove("selected");
        button.setAttribute("aria-pressed", "false");
      });

      buttons[index].classList.add("selected");
      buttons[index].setAttribute("aria-pressed", "true");
      document.getElementById("primaryQuizButton").disabled = false;
    }

    function handlePrimaryQuizButton() {
      if (!checkedQuestions[currentQuestionIndex]) {
        checkAnswer();
        return;
      }

      if (currentQuestionIndex === currentQuiz.questions.length - 1) {
        showFinalScore();
        return;
      }

      currentQuestionIndex++;
      showQuestion();
    }

    function checkAnswer() {
      const selectedIndex = selectedAnswers[currentQuestionIndex];
      const feedback = document.getElementById("feedback");

      if (selectedIndex === null) {
        feedback.textContent = "Choose an answer first.";
        feedback.className = "feedback feedback-incorrect";
        return;
      }

      checkedQuestions[currentQuestionIndex] = true;
      recalculateScore();
      showQuestion();
    }

    function applyAnswerColor(button, index, question) {
      const selectedIndex = selectedAnswers[currentQuestionIndex];
      const correctIndex = Number(question.answerIndex);

      if (index === correctIndex) {
        button.classList.add("correct");
      }

      if (index === selectedIndex && selectedIndex !== correctIndex) {
        button.classList.add("incorrect");
      }
    }

    function showSavedFeedback() {
      const question = currentQuiz.questions[currentQuestionIndex];
      const selectedIndex = selectedAnswers[currentQuestionIndex];
      const correctIndex = Number(question.answerIndex);
      const feedback = document.getElementById("feedback");

      if (selectedIndex === correctIndex) {
        feedback.textContent = "Correct. " + (question.explanation || "");
        feedback.className = "feedback feedback-correct";
      } else {
        feedback.textContent =
          "Not quite. The correct answer is " +
          question.choices[correctIndex] +
          ". " +
          (question.explanation || "");
        feedback.className = "feedback feedback-incorrect";
      }
    }

    function goBack() {
      if (currentQuestionIndex === 0) {
        return;
      }

      currentQuestionIndex--;
      showQuestion();
    }

    function recalculateScore() {
      score = 0;

      currentQuiz.questions.forEach(function (question, index) {
        if (
          checkedQuestions[index] &&
          Number(selectedAnswers[index]) === Number(question.answerIndex)
        ) {
          score++;
        }
      });

      document.getElementById("scoreText").textContent = score;
    }

    function showFinalScore() {
      const percent = Math.round((score / currentQuiz.questions.length) * 100);

      document.getElementById("progressText").textContent = "Quiz complete";
      document.getElementById("progressPercent").textContent = "100% complete";
      document.getElementById("questionText").textContent =
        "You scored " + score + " out of " + currentQuiz.questions.length + ".";
      document.getElementById("progressFill").style.width = "100%";
      document.getElementById("choices").innerHTML =
        '<div class="final-card">' +
        '<p class="final-percent">' + percent + '%</p>' +
        '<p class="final-label">Final score</p>' +
        '</div>';
      document.getElementById("feedback").textContent = "";

      const backButton = document.getElementById("backButton");
      const primaryButton = document.getElementById("primaryQuizButton");

      backButton.disabled = false;
      backButton.querySelector("span").textContent = "Review answers";
      backButton.onclick = reviewAnswers;
      primaryButton.textContent = "Restart quiz";
      appendArrowIcon(primaryButton);
      primaryButton.disabled = false;
      primaryButton.onclick = restartQuiz;
    }

    function reviewAnswers() {
      showQuestion();
    }

    function restartQuiz() {
      currentQuestionIndex = 0;
      selectedAnswers = new Array(currentQuiz.questions.length).fill(null);
      checkedQuestions = new Array(currentQuiz.questions.length).fill(false);
      score = 0;

      document.getElementById("scoreText").textContent = "0";
      showQuestion();
    }
  </script>
</body>

</html>
