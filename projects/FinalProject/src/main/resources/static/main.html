<!DOCTYPE html>
<html>

<head>
  <title>Java Webpage</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.25), transparent 35%),
        linear-gradient(135deg, #0f172a, #1e293b);
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      letter-spacing: -1px;
      color: #ffffff;
    }

    .subtitle {
      margin: 0 0 30px;
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #cbd5e1;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(30, 41, 59, 0.75);
      color: #f8fafc;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus,
    textarea:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.18);
      background: rgba(30, 41, 59, 0.95);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.5;
    }

    button {
      margin-top: 24px;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(99, 102, 241, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(99, 102, 241, 0.45);
    }

    button:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    #result {
      margin-top: 26px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.25);
      color: #e2e8f0;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    @media (max-width: 650px) {
      .card {
        padding: 26px;
      }

      h1 {
        font-size: 34px;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Quiz Generator</h1>
      <p class="subtitle">Turn your notes into a clean multiple-choice quiz.</p>

      <form>
        <div class="row">
          <div class="field">
            <label for="numQuestions">Number of questions</label>
            <input type="text" id="numQuestions" name="numQuestions" size="5" placeholder="Example: 10">
          </div>

          <div class="field">
            <label for="numChoices">Number of choices</label>
            <input type="text" id="numChoices" name="numChoices" maxlength="10" size="5" placeholder="Example: 4">
          </div>
        </div>

        <div class="field">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="10" cols="30" placeholder="Paste your notes here..."></textarea>
        </div>
      </form>

      <button onclick="send()">Generate Quiz</button>

      <p id="result"></p>
    </div>
  </div>

  <script>
    async function send() {
      const numQuestions = document.getElementById("numQuestions").value;
      const numChoices = document.getElementById("numChoices").value;
      const notes = document.getElementById("notes").value;

      const response = await fetch("/api/message", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          numQuestions: numQuestions,
          numChoices: numChoices,
          notes: notes
        })
      })
      const data = await response.json();

      document.getElementById("result").innerText = data.reply;
    }
  </script>
</body>

</html>
